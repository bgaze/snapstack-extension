<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <link rel="stylesheet" href="options.css" />
  </head>
  <body>
    <main class="page">
      <header class="head">
        <img class="logo" src="icons/icon.svg" alt="" />
        <h1 data-i18n="optionsTitle"></h1>
      </header>

      <!-- Server-owned capture policy: one edit applies to every browser. -->
      <section class="card">
        <h2><span class="scope" aria-hidden="true">🌐</span> <span data-i18n="optionsSharedTitle"></span></h2>
        <p class="hint" data-i18n="optionsSharedHint"></p>

        <label class="field">
          <span data-i18n="optionsFieldFormat"></span>
          <select id="format">
            <option value="webp">WebP</option>
            <option value="png">PNG</option>
            <option value="jpg">JPEG</option>
          </select>
          <span class="help" data-i18n="optionsHelpFormat"></span>
        </label>
        <label class="field">
          <span data-i18n="optionsFieldQuality"></span>
          <div class="inline">
            <input id="quality" type="number" min="0" max="100" step="1" aria-describedby="err-quality" />
            <span class="unit">%</span>
          </div>
          <span class="help" data-i18n="optionsHelpQuality"></span>
          <span class="field-error" id="err-quality"></span>
        </label>
        <label class="field">
          <span data-i18n="optionsFieldMaxWidth"></span>
          <input id="maxWidth" type="number" min="0" step="1" aria-describedby="err-maxWidth" />
          <span class="help" data-i18n="optionsHelpMaxWidth"></span>
          <span class="field-error" id="err-maxWidth"></span>
        </label>
        <label class="field">
          <span data-i18n="optionsFieldMaxSlices"></span>
          <input id="maxSlices" type="number" min="1" step="1" aria-describedby="err-maxSlices" />
          <span class="help" data-i18n="optionsHelpMaxSlices"></span>
          <span class="field-error" id="err-maxSlices"></span>
        </label>

        <div class="row">
          <button id="saveShared" class="btn" data-i18n="optionsSave"></button>
          <button id="resetShared" class="btn btn-ghost" data-i18n="optionsResetDefaults"></button>
        </div>
        <p class="msg" id="sharedMsg" role="status"></p>
      </section>

      <!-- Local to this browser only. -->
      <section class="card">
        <h2><span class="scope" aria-hidden="true">💻</span> <span data-i18n="optionsLocalTitle"></span></h2>
        <p class="hint" data-i18n="optionsLocalHint"></p>

        <div class="field">
          <span data-i18n="optionsFieldServerBase"></span>
          <div class="inline">
            <input id="serverBase" type="text" inputmode="url" spellcheck="false" readonly aria-describedby="err-serverBase" />
            <button id="editServer" class="icon-btn" type="button" data-i18n-title="optionsEdit">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.12 2.12 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
            </button>
            <button id="saveServer" class="icon-btn" type="button" data-i18n-title="optionsSave" hidden>
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
            </button>
            <button id="cancelServer" class="icon-btn" type="button" data-i18n-title="optionsCancel" hidden>
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
            </button>
          </div>
          <span class="field-error" id="err-serverBase"></span>
        </div>

        <div class="field">
          <span data-i18n="optionsFieldShortcut"></span>
          <ul class="shortcuts">
            <li><span data-i18n="toolbarCapture"></span><code id="sc-capture"></code></li>
            <li><span data-i18n="toolbarCaptureZone"></span><code id="sc-capture-zone"></code></li>
            <li><span data-i18n="toolbarCaptureFull"></span><code id="sc-capture-full"></code></li>
          </ul>
          <p class="hint small" id="shortcutHelp"></p>
        </div>
      </section>
    </main>
    <script src="options.js"></script>
  </body>
</html>
