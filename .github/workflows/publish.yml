name: Publish

# Builds the per-browser packages and uploads them to the stores when a version
# tag is pushed (e.g. v1.2.0). Draft: each upload step is inert until its store
# secrets are set. Stores then auto-update installed users. Edge is covered by
# the Chrome Web Store (Edge can install from it) — no separate Edge job here.
#
# Required repo secrets:
#   Chrome Web Store: CHROME_EXTENSION_ID, CHROME_CLIENT_ID, CHROME_CLIENT_SECRET,
#                     CHROME_REFRESH_TOKEN
#   Firefox AMO     : AMO_JWT_ISSUER, AMO_JWT_SECRET
# Manual fallback if a store step is not wired yet: docs/store-submission.md.

on:
  push:
    tags: ['v*']

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run lint
      # Emits dist/{chrome,firefox}/ + a per-browser zip (scripts/build.mjs).
      - run: npm run build

      - name: Upload to Chrome Web Store
        run: npx --yes chrome-webstore-upload-cli@3 upload --source $(ls dist/snapstack-chrome-*.zip) --auto-publish
        env:
          EXTENSION_ID: ${{ secrets.CHROME_EXTENSION_ID }}
          CLIENT_ID: ${{ secrets.CHROME_CLIENT_ID }}
          CLIENT_SECRET: ${{ secrets.CHROME_CLIENT_SECRET }}
          REFRESH_TOKEN: ${{ secrets.CHROME_REFRESH_TOKEN }}

      - name: Submit to Firefox AMO
        run: npx --yes web-ext sign --channel listed --source-dir dist/firefox --artifacts-dir dist/amo
        env:
          WEB_EXT_API_KEY: ${{ secrets.AMO_JWT_ISSUER }}
          WEB_EXT_API_SECRET: ${{ secrets.AMO_JWT_SECRET }}
